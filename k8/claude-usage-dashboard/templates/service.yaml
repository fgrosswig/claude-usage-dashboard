apiVersion: v1
kind: Service
metadata:
  name: {{ include "cud.fullname" . }}
  labels:
    {{- include "cud.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.portDashboard }}
      targetPort: http-dashboard
      protocol: TCP
      name: http-dashboard
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePortDashboard }}
      nodePort: {{ .Values.service.nodePortDashboard }}
      {{- end }}
    - port: {{ .Values.service.portProxy }}
      targetPort: http-proxy
      protocol: TCP
      name: http-proxy
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePortProxy }}
      nodePort: {{ .Values.service.nodePortProxy }}
      {{- end }}
  selector:
    {{- include "cud.selectorLabels" . | nindent 4 }}
