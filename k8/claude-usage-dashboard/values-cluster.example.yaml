# Beispiel für echtes Cluster (Harbor-Projekt "claude", StorageClass, Ingress, Secrets).
# Harbor: https://gitea.grosswig-it.de/GRO/infrastructure-docs/src/branch/main/docs/05-harbor.md
# Registry-Host exakt aus eurer Doku; Projekt = claude, Repo = claude-usage-dashboard.
# Nicht committen, wenn du echte Geheimnisse in Overrides legst:
#   helm upgrade --install cud ./k8/claude-usage-dashboard -n claude --create-namespace \
#     -f values.yaml -f values-cluster.example.yaml -f secrets.local.yaml

image:
  # Host aus 05-harbor.md; Projekt claude, Repo claude-usage-dashboard
  repository: harbor.grosswig-it.de/claude/claude-usage-dashboard
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# kubectl create secret docker-registry … — siehe 05-harbor.md (Name ggf. anpassen)
imagePullSecrets:
  - name: harbor-pull

claudeData:
  mode: newPvc
  newPvc:
    storageClassName: local-path
    size: 20Gi

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: usage-dashboard.example.com
      paths:
        - path: /
          pathType: Prefix
          port: 3333
  tls:
    - secretName: usage-dashboard-tls
      hosts:
        - usage-dashboard.example.com

config:
  scanIntervalSec: "180"
  syncMaxMb: "512"
  logLevel: "info"

# Secret-Objekt separat (kubectl) oder secrets.create + secrets.local.yaml
secrets:
  existingSecret: claude-usage-dashboard-app

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
