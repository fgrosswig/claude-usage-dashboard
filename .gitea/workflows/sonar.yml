name: SonarQube Scan (Manual)

on:
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sonar-scanner
        run: |
          SCANNER_VERSION=6.2.1.4610
          curl -sL "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux-x64.zip" -o /tmp/scanner.zip
          unzip -q /tmp/scanner.zip -d /opt
          ln -s /opt/sonar-scanner-${SCANNER_VERSION}-linux-x64/bin/sonar-scanner /usr/local/bin/sonar-scanner

      - name: SonarQube Scan
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            sonar-scanner \
              -Dsonar.host.url=${{ secrets.SONAR_URL }} \
              -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          else
            sonar-scanner \
              -Dsonar.host.url=${{ secrets.SONAR_URL }} \
              -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.branch.name=$BRANCH
          fi

      - name: Quality Gate
        run: |
          echo "Waiting 10s for SonarQube to process..."
          sleep 10
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            QG_URL="${{ secrets.SONAR_URL }}/api/qualitygates/project_status?projectKey=claude-usage-dashboard"
          else
            QG_URL="${{ secrets.SONAR_URL }}/api/qualitygates/project_status?projectKey=claude-usage-dashboard&branch=$BRANCH"
          fi
          STATUS=$(curl -sf -u "${{ secrets.SONAR_TOKEN }}:" "$QG_URL" | jq -r '.projectStatus.status')
          echo "Quality Gate ($BRANCH): $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "FAILED: Quality Gate not passed."
            curl -sf -u "${{ secrets.SONAR_TOKEN }}:" "$QG_URL" | jq '.projectStatus.conditions[] | select(.status != "OK")'
            exit 1
          fi
          echo "Quality Gate passed."
