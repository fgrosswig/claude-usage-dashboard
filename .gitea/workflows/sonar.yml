name: SonarQube Scan (Manual)

on:
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    container:
      image: sonarsource/sonar-scanner-cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        run: |
          echo "===================================\n 
                SONAR URL\n 
                ${{ secrets.SONAR_URL }} "\n
                =================================\n" \
          # Nutzt volle Pfade und Debug-Logging (-X)
          /opt/sonar-scanner/bin/sonar-scanner \
            -X \
            -Dsonar.host.url=${{ secrets.SONAR_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            $( [ "$GITHUB_REF_NAME" != "main" ] && echo "-Dsonar.branch.name=$GITHUB_REF_NAME" )
         # BRANCH="${{ github.ref_name }}"
         # if [ "$BRANCH" = "main" ]; then
         #   /opt/sonar-scanner/bin/sonar-scanner \
         #     -Dsonar.host.url=${{ secrets.SONAR_URL }} \
         #     -Dsonar.token=${{ secrets.SONAR_TOKEN }}
         # else
         #   /opt/sonar-scanner/bin/sonar-scanner \
         #     -Dsonar.host.url=${{ secrets.SONAR_URL }} \
         #     -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
         #     -Dsonar.branch.name=$BRANCH
         # fi

      - name: Quality Gate
        run: |
          echo "Waiting 10s for SonarQube to process..."
          sleep 10
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            QG_URL="${{ secrets.SONAR_URL }}/api/qualitygates/project_status?projectKey=claude-usage-dashboard"
          else
            QG_URL="${{ secrets.SONAR_URL }}/api/qualitygates/project_status?projectKey=claude-usage-dashboard&branch=$BRANCH"
          fi
          STATUS=$(curl -sf -u "${{ secrets.SONAR_TOKEN }}:" "$QG_URL" | jq -r '.projectStatus.status')
          echo "Quality Gate ($BRANCH): $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "FAILED: Quality Gate not passed."
            curl -sf -u "${{ secrets.SONAR_TOKEN }}:" "$QG_URL" | jq '.projectStatus.conditions[] | select(.status != "OK")'
            exit 1
          fi
          echo "Quality Gate passed."
