name: Build & Deploy

on:
  push:
    branches: [main, develop]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build params
        id: params
        run: |
          BASE_VER=$(awk -F'"' '/base_image/{print $4}' version.json)
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          echo "base_ver=$BASE_VER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=latest,$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "app_version=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "tags=dev-$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "app_version=dev-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Dockerfile
        run: |
          sed "s|^ARG BASE_TAG=.*|ARG BASE_TAG=${{ steps.params.outputs.base_ver }}|" Dockerfile > Dockerfile.ci

      - name: Login to Harbor
        run: |
          docker login harbor.grosswig-it.de -u '${{ secrets.HARBOR_USER }}' -p '${{ secrets.HARBOR_PASSWORD }}'
        env:
          DOCKER_API_VERSION: "1.41"

      - name: Build and push
        env:
          DOCKER_API_VERSION: "1.41"
        run: |
          TAGS="${{ steps.params.outputs.tags }}"
          TAG_FLAGS=""
          IFS=',' read -ra TAG_ARR <<< "$TAGS"
          for t in "${TAG_ARR[@]}"; do
            TAG_FLAGS="$TAG_FLAGS -t harbor.grosswig-it.de/claude/claude-usage-dashboard:$t"
          done
          docker build \
            --build-arg CI_COMMIT_SHORT_SHA=${{ steps.params.outputs.short_sha }} \
            --build-arg CI_COMMIT_REF_NAME=${{ github.ref_name }} \
            --build-arg APP_VERSION=${{ steps.params.outputs.app_version }} \
            $TAG_FLAGS \
            -f Dockerfile.ci .
          for t in "${TAG_ARR[@]}"; do
            docker push "harbor.grosswig-it.de/claude/claude-usage-dashboard:$t"
          done

  sonar:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.host.url=${{ secrets.SONAR_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate
        run: |
          echo "Waiting 10s for SonarQube to process..."
          sleep 10
          STATUS=$(curl -sf -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_URL }}/api/qualitygates/project_status?projectKey=claude-usage-dashboard" \
            | jq -r '.projectStatus.status')
          echo "Quality Gate: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "FAILED: Quality Gate not passed"
            curl -sf -u "${{ secrets.SONAR_TOKEN }}:" \
              "${{ secrets.SONAR_URL }}/api/qualitygates/project_status?projectKey=claude-usage-dashboard" \
              | jq '.projectStatus.conditions[] | select(.status != "OK")'
            exit 1
          fi

  deploy:
    needs: build
    runs-on: k8s
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to K8s
        run: |
          set -eux
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          K="kubectl --server=${{ secrets.KUBE_URL }} --token=${{ secrets.KUBE_TOKEN }} --insecure-skip-tls-verify --request-timeout=120s"
          $K apply -k k8s/overlays/dev
          if ! $K get secret harbor-pull -n claude >/dev/null 2>&1; then
            echo "ERROR: Secret harbor-pull missing in namespace claude"
            exit 1
          fi
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG="$SHORT_SHA"
          else
            TAG="dev-$SHORT_SHA"
          fi
          $K set image deployment/claude-app app=harbor.grosswig-it.de/claude/claude-usage-dashboard:$TAG -n claude
          $K rollout status deployment/claude-app -n claude --timeout=3m

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Harbor cleanup
        run: |
          API="https://harbor.grosswig-it.de/api/v2.0/projects/claude/repositories/claude-usage-dashboard/artifacts"
          if [ "${{ github.ref_name }}" = "main" ]; then
            KEEP=2
            TAGS=$(curl -s -u "${{ secrets.HARBOR_USER }}:${{ secrets.HARBOR_PASSWORD }}" \
              "$API?page_size=50&sort=-push_time" \
              | jq -r '.[].tags[]?.name // empty' 2>/dev/null \
              | grep -v latest | grep -v '^dev-')
          else
            KEEP=1
            TAGS=$(curl -s -u "${{ secrets.HARBOR_USER }}:${{ secrets.HARBOR_PASSWORD }}" \
              "$API?page_size=50&sort=-push_time" \
              | jq -r '.[].tags[]?.name // empty' 2>/dev/null \
              | grep '^dev-')
          fi
          COUNT=0
          echo "$TAGS" | while read TAG; do
            COUNT=$((COUNT+1))
            if [ $COUNT -gt $KEEP ]; then
              echo "Deleting old tag: $TAG"
              curl -s -X DELETE -u "${{ secrets.HARBOR_USER }}:${{ secrets.HARBOR_PASSWORD }}" "$API/$TAG" || true
            fi
          done
        continue-on-error: true
