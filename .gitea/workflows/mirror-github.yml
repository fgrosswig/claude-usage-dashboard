# Gitea (intern) → GitHub (öffentlich): nur branch main, flacher Snapshot — Forge-Repo bleibt unverändert.
# - MIRROR_EXCLUDE_PATHS: .woodpecker / .gitea bleiben nur intern (nicht auf GitHub).
# - .github/ wird gespiegelt (öffentliche GitHub Actions CI).
# - Aufbereitung nur unter /tmp/…-Snapshot: Gitea-Arbeitskopie bleibt unberührt (kein reset).
# - Danach: interne Hosts/Domains in Textdateien → Platzhalter (nur im Snapshot, nicht im Gitea-Repo).
#
# Secret GH_PAT_TOKEN — in Gitea als Repo-Secret **oder** Org-Secret (Name exakt GH_PAT_TOKEN):
# - Org-Secret: unter Organisation → Secrets anlegen; für dieses Repo **Zugriff erlauben** (wie in Gitea für Actions vorgesehen).
# - Im Workflow weiterhin secrets.GH_PAT_TOKEN — Gitea setzt Repo- und Org-Secrets zusammen, sofern das Repo berechtigt ist.
# - GitHub PAT muss **Schreibzugriff** auf fgrosswig/claude-usage-dashboard haben.
# - Classic PAT: Scope **repo** (voll). Fine-grained: Repo auswählen, **Contents: Read and write**.
# - GitHub Org/SSO: PAT dort **autorisieren**. Abgelaufenes/falsches Secret → oft 401/403.
# - Kein Force-Push: Arbeitsbaum = aktuelle github/main + ein normaler Snapshot-Commit (Branch-Schutz-kompatibel).

name: Mirror to GitHub

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  MIRROR_EXCLUDE_PATHS: .woodpecker .gitea

jobs:
  mirror-main:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Publish snapshot to GitHub (main only, strip internal refs)
        env:
          GH_MIRROR_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          MIRROR_DEST_BRANCH: main
        run: |
          set -eux
          if [ -z "${GH_MIRROR_TOKEN:-}" ]; then
            echo "GH_MIRROR_TOKEN (secret GH_PAT_TOKEN) is empty — set it in Gitea repo/org secrets."
            exit 1
          fi
          python3 <<'PY'
          import json, os, sys, urllib.error, urllib.request
          token = os.environ["GH_MIRROR_TOKEN"]
          url = "https://api.github.com/repos/fgrosswig/claude-usage-dashboard"
          req = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": "Bearer " + token,
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.load(r)
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", "replace")[:800]
              print("GitHub API HTTP", e.code, body)
              sys.exit(1)
          perms = data.get("permissions") or {}
          if not perms.get("push"):
              print("GitHub API: this token has NO push permission on fgrosswig/claude-usage-dashboard.")
              print("Fix: Classic PAT with full **repo** scope, or Fine-grained with **Contents: Read and write** for this repo (and SSO authorize if needed).")
              sys.exit(1)
          print("GitHub API: push permission OK for repo", data.get("full_name"))
          PY
          git config user.email "public-mirror@users.noreply.local"
          git config user.name "public-mirror"
          git remote add github "https://x-access-token:${GH_MIRROR_TOKEN}@github.com/fgrosswig/claude-usage-dashboard.git"
          SHORT="$(git rev-parse --short HEAD)"
          EXPORT_DIR="/tmp/mirror-publish-tree"
          rm -rf "${EXPORT_DIR}"
          mkdir -p "${EXPORT_DIR}"
          # Nur EXPORT_DIR: Gitea-Klon bleibt unverändert (kein sed/rm im Checkout, kein git reset).
          tar --exclude=.git -cf - . | (cd "${EXPORT_DIR}" && tar -xf -)
          for p in ${MIRROR_EXCLUDE_PATHS}; do
            [ -z "${p}" ] && continue
            rm -rf "${EXPORT_DIR}/${p}"
          done
          # Vollständige Bereinigung nur im Snapshot (siehe scripts/scrub-for-public.sh; Bash wegen read -d '').
          bash "${EXPORT_DIR}/scripts/scrub-for-public.sh" "${EXPORT_DIR}"
          # Leak-Check: kein grep -r --include (BusyBox/GNU unterscheiden sich); Python ist einheitlich.
          export EXPORT_DIR
          python3 <<'PY'
          import os, re, sys
          root = os.environ["EXPORT_DIR"]
          pat = re.compile(r"gitea\.grosswig-it\.de")
          suf = (".md", ".mdx", ".yml", ".yaml", ".json")
          bad = []
          for dp, dns, fns in os.walk(root):
              if ".git" in dns:
                  dns.remove(".git")
              for fn in fns:
                  if not fn.endswith(suf):
                      continue
                  path = os.path.join(dp, fn)
                  if "scrub-for-public.sh" in path:
                      continue
                  try:
                      with open(path, "r", encoding="utf-8", errors="replace") as f:
                          if pat.search(f.read()):
                              bad.append(path)
                  except OSError:
                      pass
          if bad:
              print("mirror: scrub leak — gitea.grosswig-it.de still in export:")
              for p in bad:
                  print(" ", p)
              sys.exit(1)
          PY
          git fetch github "refs/heads/${MIRROR_DEST_BRANCH}:refs/remotes/github/${MIRROR_DEST_BRANCH}" 2>/dev/null \
            || git fetch github || true
          if git rev-parse --verify "github/${MIRROR_DEST_BRANCH}" >/dev/null 2>&1; then
            git checkout -B public-publish "github/${MIRROR_DEST_BRANCH}"
            git ls-files -z | xargs -0 -r git rm -f --
            git clean -fdx
          else
            git checkout --orphan public-publish
          fi
          tar -C "${EXPORT_DIR}" -cf - . | tar -xf -
          git add -A
          if git diff --cached --quiet; then
            echo "mirror: no changes vs GitHub ${MIRROR_DEST_BRANCH}; skip"
            exit 0
          fi
          git commit -m "chore(publish): public snapshot (internal ${SHORT})"
          git push github "HEAD:refs/heads/${MIRROR_DEST_BRANCH}"
