# Gitea → GitHub: nur branch main — flacher Snapshot (keine Gitea-Commit-Historie).
# Interne Pfade (Woodpecker, Gitea-Workflows) fallen raus. .github/ bleibt drin — öffentliche GitHub Actions CI.

name: Mirror to GitHub

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  MIRROR_EXCLUDE_PATHS: .woodpecker .gitea

jobs:
  mirror-main:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Publish snapshot to GitHub (main only)
        env:
          GH_MIRROR_TOKEN: ${{ secrets.gh_pat_token }}
          MIRROR_DEST_BRANCH: main
        run: |
          set -eux
          git config user.email "gitea-publish@users.noreply.local"
          git config user.name "gitea-publish"
          git remote add github "https://x-access-token:${GH_MIRROR_TOKEN}@github.com/fgrosswig/claude-usage-dashboard.git"
          SHORT="$(git rev-parse --short HEAD)"
          for p in ${MIRROR_EXCLUDE_PATHS}; do
            [ -z "${p}" ] && continue
            rm -rf "${p}"
          done
          git checkout --orphan public-publish
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to publish"
            exit 1
          fi
          git commit -m "chore(publish): public snapshot (internal ${SHORT})"
          git push -f github "HEAD:${MIRROR_DEST_BRANCH}"
