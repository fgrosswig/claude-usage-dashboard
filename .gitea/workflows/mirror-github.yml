# Gitea (intern) → GitHub (öffentlich): nur branch main, flacher Snapshot — Forge-Repo bleibt unverändert.
# - MIRROR_EXCLUDE_PATHS: .woodpecker / .gitea bleiben nur intern (nicht auf GitHub).
# - .github/ wird gespiegelt (öffentliche GitHub Actions CI).
# - Danach: interne Hosts/Domains in Textdateien → Platzhalter (nur im Snapshot, nicht im Gitea-Repo).
#
# Secret GH_PAT_TOKEN (Repo- oder Org-Secret in Gitea):
# - GitHub PAT dieses Benutzers muss **Schreibzugriff** auf fgrosswig/claude-usage-dashboard haben.
# - Classic PAT: Scope **repo** (voll). Fine-grained: Repo auswählen, **Contents: Read and write**.
# - Bei Org/SSO: Token dort **autorisieren**. Abgelaufenes/falsches Secret → oft 401/403.
# - git push -f auf main: Branch protection blockiert oft Force-Push. Auf GitHub:
#   Settings → Branches → Rule für „main“ → „Allow force pushes“ (nur für dich) aktivieren,
#   oder Regel lockern / Bypass für Maintainer.
# - PAT-Tipp: Lieber **Classic** mit Scope **repo** testen — Fine-grained oft Read-only vergessen.

name: Mirror to GitHub

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  MIRROR_EXCLUDE_PATHS: .woodpecker .gitea

jobs:
  mirror-main:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Publish snapshot to GitHub (main only, strip internal refs)
        env:
          GH_MIRROR_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          MIRROR_DEST_BRANCH: main
        run: |
          set -eux
          if [ -z "${GH_MIRROR_TOKEN:-}" ]; then
            echo "GH_MIRROR_TOKEN (secret GH_PAT_TOKEN) is empty — set it in Gitea repo/org secrets."
            exit 1
          fi
          python3 <<'PY'
          import json, os, sys, urllib.error, urllib.request
          token = os.environ["GH_MIRROR_TOKEN"]
          url = "https://api.github.com/repos/fgrosswig/claude-usage-dashboard"
          req = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": "Bearer " + token,
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.load(r)
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", "replace")[:800]
              print("GitHub API HTTP", e.code, body)
              sys.exit(1)
          perms = data.get("permissions") or {}
          if not perms.get("push"):
              print("GitHub API: this token has NO push permission on fgrosswig/claude-usage-dashboard.")
              print("Fix: Classic PAT with full **repo** scope, or Fine-grained with **Contents: Read and write** for this repo (and SSO authorize if needed).")
              sys.exit(1)
          print("GitHub API: push permission OK for repo", data.get("full_name"))
          PY
          git config user.email "public-mirror@users.noreply.local"
          git config user.name "public-mirror"
          git remote add github "https://x-access-token:${GH_MIRROR_TOKEN}@github.com/fgrosswig/claude-usage-dashboard.git"
          SHORT="$(git rev-parse --short HEAD)"
          for p in ${MIRROR_EXCLUDE_PATHS}; do
            [ -z "${p}" ] && continue
            rm -rf "${p}"
          done
          git checkout --orphan public-publish
          find . -type f ! -path './.git/*' \( \
              -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.sh' -o -name '*.tpl' \
              -o -name 'Dockerfile' -o -name 'Dockerfile.*' -o -name 'docker-compose*.yml' \
            \) -print0 | while IFS= read -r -d '' f; do
              sed -i \
                -e 's/harbor\.grosswig-it\.de/registry.example.com/g' \
                -e 's/gitea\.grosswig-it\.de/git.example.com/g' \
                -e 's/ci\.grosswig-it\.de/ci.example.com/g' \
                "$f" || true
            done
          find . -type f ! -path './.git/*' -name '*.md' -print0 | while IFS= read -r -d '' f; do
              sed -i '/Woodpecker CI/d;/grosswig-it\.de/d' "$f" || true
            done
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to publish"
            exit 1
          fi
          git commit -m "chore(publish): public snapshot (internal ${SHORT})"
          if ! git push -f github "HEAD:${MIRROR_DEST_BRANCH}"; then
            echo "git push failed with 403? If API check passed: **branch protection** blocks force-push to main."
            echo "On github.com: Repo → Settings → Branches → edit rule for main → allow force pushes (or bypass for your user)."
            exit 1
          fi
