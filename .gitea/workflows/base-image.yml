name: Base Image

on:
  push:
    paths:
      - Dockerfile.base
      - package.json
      - package-lock.json
      - version.json
      - .gitea/workflows/base-image.yml
    branches: [main, develop, 'feat/**', 'fix/**']
  workflow_dispatch:

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Harbor
        run: |
          docker login harbor.grosswig-it.de -u '${{ secrets.HARBOR_USER }}' -p '${{ secrets.HARBOR_PASSWORD }}'
        env:
          DOCKER_API_VERSION: "1.41"

      - name: Build and push base image
        env:
          DOCKER_API_VERSION: "1.41"
        run: |
          docker build -f Dockerfile.base \
            -t harbor.grosswig-it.de/claude/base:v3 \
            -t harbor.grosswig-it.de/claude/base:latest \
            .
          docker push harbor.grosswig-it.de/claude/base:v3
          docker push harbor.grosswig-it.de/claude/base:latest
