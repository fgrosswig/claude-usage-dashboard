name: Base Image

on:
  push:
    paths:
      - Dockerfile.base
      - package.json
      - package-lock.json
      - version.json
      - .gitea/workflows/base-image.yml
    branches: [main, develop, 'feat/**', 'fix/**']
  workflow_dispatch:

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push base image via Kaniko
        run: |
          mkdir -p /tmp/kaniko-config
          echo "{\"auths\":{\"harbor.grosswig-it.de\":{\"auth\":\"$(echo -n "$HARBOR_USER:$HARBOR_PASSWORD" | base64)\"}}}" > /tmp/kaniko-config/config.json
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "/tmp/kaniko-config:/kaniko/.docker:ro" \
            gcr.io/kaniko-project/executor:latest \
            --context=/workspace \
            --dockerfile=/workspace/Dockerfile.base \
            --destination=harbor.grosswig-it.de/claude/base:v3 \
            --destination=harbor.grosswig-it.de/claude/base:latest
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
