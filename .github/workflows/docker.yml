name: Docker

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build base image (Dockerfile.base)
        run: docker build -f Dockerfile.base -t claude-base:ci .

      - name: Build application image
        run: |
          docker build \
            --build-arg BASE_IMAGE=claude-base \
            --build-arg BASE_TAG=ci \
            -t claude-usage:ci \
            .

      # README: App-Image enthält screenshots unter /app/images (Dockerfile: COPY images).
      - name: Screenshot assets (images/) im Repo
        run: |
          test -d images
          n="$(find images -maxdepth 1 -type f -name '*.png' 2>/dev/null | wc -l)"
          test "${n:-0}" -ge 1

      - name: Screenshots im Image (/app/images)
        run: |
          docker run --rm claude-usage:ci sh -c 'test -d /app/images && ls -1 /app/images/*.png >/dev/null'

      # Image-CMD: node start.js both (Proxy läuft im Container intern; CI prüft nur Dashboard :3333).
      - name: Smoke — HTTP :3333 + /api/usage, Logs, Container weg
        run: |
          docker run -d --name cud-smoke -p 3333:3333 \
            -e ANTHROPIC_PROXY_BIND=0.0.0.0 \
            --tmpfs /root/.claude:rw,size=256m \
            claude-usage:ci
          ok=0
          for i in $(seq 1 30); do
            if curl -sf --max-time 3 http://127.0.0.1:3333/ -o /dev/null; then
              ok=1
              break
            fi
            sleep 2
          done
          test "$ok" = 1
          curl -sf --max-time 3 http://127.0.0.1:3333/api/usage -o /dev/null
          echo "===== cud-smoke logs (nach curl :3333) ====="
          docker logs --tail 400 cud-smoke 2>&1 || true
          docker rm -f cud-smoke

      - name: Compose smoke — nur :3333
        env:
          CLAUDE_USAGE_IMAGE: claude-usage:ci
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build claude-usage
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d claude-usage
          ok=0
          for i in $(seq 1 30); do
            if curl -sf --max-time 3 http://127.0.0.1:3333/ -o /dev/null; then
              ok=1
              break
            fi
            sleep 2
          done
          test "$ok" = 1
          curl -sf --max-time 3 http://127.0.0.1:3333/api/usage -o /dev/null
          echo "===== compose logs (nach curl :3333) ====="
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail 400 2>&1 || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down
