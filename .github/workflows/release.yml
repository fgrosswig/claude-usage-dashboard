name: Auto-Release

on:
  push:
    branches: [main]

jobs:
  auto-tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then LAST_TAG="v0.0.0"; fi
          TAG_SHA=$(git rev-list -n1 "$LAST_TAG" 2>/dev/null || echo "")
          HEAD_SHA=$(git rev-parse HEAD)
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

          if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "HEAD is already tagged — skipping"
            exit 0
          fi

          # Commits since last tag (first line only, skip merge + tx-log)
          REAL_COMMITS=$(git log --oneline "$LAST_TAG..HEAD" --no-merges \
            | grep -vE "tx-log|chore: tx-log" \
            | cut -d' ' -f2-)

          if [ -z "$REAL_COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No real commits since $LAST_TAG"
            exit 0
          fi

          echo "Commits since $LAST_TAG:"
          echo "$REAL_COMMITS" | head -10

          BUMP=patch
          echo "$REAL_COMMITS" | grep -qiE "BREAKING CHANGE" && BUMP=major
          echo "$REAL_COMMITS" | grep -qE "^feat(\([^)]*\))?:" && [ "$BUMP" != "major" ] && BUMP=minor

          NEW_TAG=$(echo "$LAST_TAG" | awk -F. -v bump="$BUMP" '{
            gsub(/^v/,"",$1)
            if(bump=="major") printf "v%d.0.0\n",$1+1
            else if(bump=="minor") printf "v%s.%d.0\n",$1,$2+1
            else printf "v%s.%s.%d\n",$1,$2,$3+1
          }')

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "$LAST_TAG → $BUMP → $NEW_TAG"

      - name: Generate release notes
        if: steps.bump.outputs.skip != 'true'
        id: notes
        run: |
          NOTES=$(node scripts/generate-release-notes.js "${{ steps.bump.outputs.last_tag }}" --public 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.bump.outputs.new_tag }}"
          fi
          # Write to file (multiline output)
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create tag and release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"
          gh release create "${{ steps.bump.outputs.new_tag }}" \
            --title "${{ steps.bump.outputs.new_tag }}" \
            --notes-file /tmp/release-notes.md
