# Dev SonarQube Scan — manuell triggerbar, kein Build/Deploy
# Prueft ob der aktuelle Branch das Quality Gate besteht
when:
  - event: manual

# Voller Clone: Sonar braucht SCM-Historie (kein shallow/partial clone).
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      depth: 0
      partial: false

labels:
  platform: linux/amd64

steps:
  - name: sonar-scan
    image: sonarsource/sonar-scanner-cli
    commands:
      - |
        # Pass sonar.branch.name only for non-main branches (Community Branch Plugin required)
        if [ "$CI_COMMIT_BRANCH" = "main" ]; then
          sonar-scanner \
            -Dsonar.host.url=$SONAR_URL \
            -Dsonar.token=$SONAR_TOKEN
        else
          sonar-scanner \
            -Dsonar.host.url=$SONAR_URL \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.branch.name=$CI_COMMIT_BRANCH
        fi
    environment:
      SONAR_URL:
        from_secret: sonar_url
      SONAR_TOKEN:
        from_secret: sonar_token

  - name: quality-gate
    image: alpine
    commands:
      - |
        apk add --no-cache curl jq
        echo "Waiting 10s for SonarQube to process analysis..."
        sleep 10
        if [ "$CI_COMMIT_BRANCH" = "main" ]; then
          QG_URL="$SONAR_URL/api/qualitygates/project_status?projectKey=claude-usage-dashboard"
        else
          QG_URL="$SONAR_URL/api/qualitygates/project_status?projectKey=claude-usage-dashboard&branch=$CI_COMMIT_BRANCH"
        fi
        STATUS=$(curl -sf -u "$SONAR_TOKEN:" "$QG_URL" | jq -r '.projectStatus.status')
        echo "Quality Gate ($CI_COMMIT_BRANCH): $STATUS"
        if [ "$STATUS" != "OK" ]; then
          echo "FAILED: Quality Gate not passed."
          curl -sf -u "$SONAR_TOKEN:" "$QG_URL" | jq '.projectStatus.conditions[] | select(.status != "OK")'
          exit 1
        fi
        echo "Quality Gate passed."
    environment:
      SONAR_URL:
        from_secret: sonar_url
      SONAR_TOKEN:
        from_secret: sonar_token
