# Dev-Build: Push auf feat/**/fix/** → Container bauen + Deploy, KEIN SonarQube
# Prod-Build: Push auf main          → SonarQube + Container + Deploy + Auto-Tag (semver)
# Tag-Event:  draft-release-notes    → Draft-Release auf Gitea erstellen
when:
  - event: push
    branch: [main, develop, "feat/**", "fix/**"]
  - event: tag
  - event: manual

# Sonar auf main: voller Clone für korrekte SCM-Zuordnung (Quality Gate / Blame).
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      depth: 0
      partial: false

labels:
  platform: linux/amd64

steps:
  - name: prepare
    image: alpine
    commands:
      - |
        BASE_VER=$(awk -F'"' '/base_image/{print $4}' version.json)
        echo "Base image tag: $BASE_VER"
        sed "s|^ARG BASE_TAG=.*|ARG BASE_TAG=$BASE_VER|" Dockerfile > Dockerfile.ci
        if [ "$CI_COMMIT_BRANCH" = "main" ]; then
          echo "==> PROD BUILD (main) — SonarQube + latest tag"
        else
          echo "==> DEV BUILD ($CI_COMMIT_BRANCH) — skip SonarQube, dev-tag only"
        fi

  - name: sonar-scan
    image: sonarsource/sonar-scanner-cli
    when:
      branch: main
      event: push
    commands:
      - sonar-scanner -Dsonar.host.url=$SONAR_URL -Dsonar.token=$SONAR_TOKEN
    environment:
      SONAR_URL:
        from_secret: sonar_url
      SONAR_TOKEN:
        from_secret: sonar_token

  - name: sonar-quality-gate
    image: alpine
    when:
      branch: main
      event: push
    commands:
      - |
        apk add --no-cache curl jq
        echo "Waiting 10s for SonarQube to process analysis..."
        sleep 10
        STATUS=$(curl -sf -u "$SONAR_TOKEN:" "$SONAR_URL/api/qualitygates/project_status?projectKey=claude-usage-dashboard" | jq -r '.projectStatus.status')
        echo "Quality Gate: $STATUS"
        if [ "$STATUS" != "OK" ]; then
          echo "FAILED: Quality Gate not passed — aborting pipeline."
          exit 1
        fi
        echo "Quality Gate passed."
    environment:
      SONAR_URL:
        from_secret: sonar_url
      SONAR_TOKEN:
        from_secret: sonar_token

  - name: build-push-dev
    image: plugins/kaniko
    when:
      branch:
        exclude: main
    settings:
      repo: harbor.grosswig-it.de/claude/claude-usage-dashboard
      registry: harbor.grosswig-it.de
      dockerfile: Dockerfile.ci
      tags: dev-${CI_COMMIT_SHA:0:8}
      build_args:
        - CI_COMMIT_SHORT_SHA=${CI_COMMIT_SHA:0:8}
        - CI_COMMIT_REF_NAME=${CI_COMMIT_BRANCH}
        - APP_VERSION=dev-${CI_COMMIT_SHA:0:8}
      username:
        from_secret: harbor_user
      password:
        from_secret: harbor_password

  - name: build-push-prod
    image: plugins/kaniko
    when:
      branch: main
      event: push
    settings:
      repo: harbor.grosswig-it.de/claude/claude-usage-dashboard
      registry: harbor.grosswig-it.de
      dockerfile: Dockerfile.ci
      tags: latest,${CI_COMMIT_SHA:0:8}
      build_args:
        - CI_COMMIT_SHORT_SHA=${CI_COMMIT_SHA:0:8}
        - CI_COMMIT_REF_NAME=${CI_COMMIT_BRANCH}
        - APP_VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHA:0:8}}
      username:
        from_secret: harbor_user
      password:
        from_secret: harbor_password

  - name: deploy
    image: bitnami/kubectl
    when:
      event: push
    commands:
      - |
        set -eux
        K="kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify --request-timeout=120s"
        $K apply -k k8s/overlays/dev
        if ! $K get secret harbor-pull -n claude >/dev/null 2>&1; then
          echo "ERROR: Secret harbor-pull fehlt in Namespace claude — ohne ihn kann der Node kein privates Harbor-Image ziehen."
          echo "Siehe k8s/README.md (Pull-Secret aus Harbor-Robot). Beispiel: kubectl create secret docker-registry harbor-pull -n claude --docker-server=harbor.grosswig-it.de ..."
          exit 1
        fi
        # Dev-Build: dev-<sha>, Prod-Build: <sha> (tag events have no branch)
        if [ "${CI_COMMIT_BRANCH:-}" = "main" ] || [ -n "${CI_COMMIT_TAG:-}" ]; then
          TAG="${CI_COMMIT_SHA:0:8}"
        else
          TAG="dev-${CI_COMMIT_SHA:0:8}"
        fi
        $K set image deployment/claude-app app=harbor.grosswig-it.de/claude/claude-usage-dashboard:$TAG -n claude
        $K rollout status deployment/claude-app -n claude --timeout=3m
    environment:
      KUBE_URL:
        from_secret: kube_url
      KUBE_TOKEN:
        from_secret: kube_token

  - name: cleanup
    image: alpine
    when:
      event: push
    environment:
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASS:
        from_secret: harbor_password
    commands:
      - |
        apk add --no-cache curl jq
        API="https://harbor.grosswig-it.de/api/v2.0/projects/claude/repositories/claude-usage-dashboard/artifacts"
        # Prod: keep 2 SHA-tags + latest
        # Dev: keep only 1 dev-* tag (latest dev build)
        if [ "${CI_COMMIT_BRANCH:-}" = "main" ] || [ -n "${CI_COMMIT_TAG:-}" ]; then
          KEEP=2
          TAGS=$(curl -s -u "$HARBOR_USER:$HARBOR_PASS" "$API?page_size=50&sort=-push_time" | jq -r '.[].tags[]?.name // empty' 2>/dev/null | grep -v latest | grep -v '^dev-')
        else
          KEEP=1
          TAGS=$(curl -s -u "$HARBOR_USER:$HARBOR_PASS" "$API?page_size=50&sort=-push_time" | jq -r '.[].tags[]?.name // empty' 2>/dev/null | grep '^dev-')
        fi
        COUNT=0
        echo "$TAGS" | while read TAG; do
          COUNT=$((COUNT+1))
          if [ $COUNT -gt $KEEP ]; then
            echo "Deleting old tag: $TAG"
            curl -s -X DELETE -u "$HARBOR_USER:$HARBOR_PASS" "$API/$TAG" || true
          fi
        done
    failure: ignore

  - name: auto-tag
    image: alpine
    when:
      branch: main
      event: push
    commands:
      - |
        apk add --no-cache curl jq
        API="https://gitea.grosswig-it.de/api/v1/repos/GRO/Claude-Usage-Dashboard"
        # 1. Last tag via API (no local git tags needed)
        TAG_HTTP=$(curl -s -o /tmp/tags.json -w "%{http_code}" \
          -H "Authorization: token $GITEA_TOKEN" "$API/tags?limit=1")
        echo "Tags API: HTTP $TAG_HTTP"
        cat /tmp/tags.json | head -1
        LAST_TAG=$(jq -r '.[0].name // empty' /tmp/tags.json 2>/dev/null)
        if [ -z "$LAST_TAG" ]; then LAST_TAG="v0.0.0"; fi
        TAG_SHA=$(jq -r '.[0].commit.sha // empty' /tmp/tags.json 2>/dev/null)
        echo "Last tag: $LAST_TAG ($TAG_SHA)"
        # 2. Commits since tag via API
        if [ "$TAG_SHA" = "$CI_COMMIT_SHA" ]; then
          echo "HEAD is already tagged — skipping"
          exit 0
        fi
        COMMITS=$(curl -sf -H "Authorization: token $GITEA_TOKEN" \
          "$API/commits?sha=main&limit=50" \
          | jq -r --arg stop "$TAG_SHA" '
            [.[] | select(.sha != $stop) | .commit.message | split("\n")[0]] |
            if length == 0 then empty else .[] end')
        if [ -z "$COMMITS" ]; then
          echo "No new commits since $LAST_TAG — skipping"
          exit 0
        fi
        echo "Commits since $LAST_TAG:"
        echo "$COMMITS" | head -10
        # 3. Determine bump type (filter out merge commits + tx-log)
        REAL_COMMITS=$(echo "$COMMITS" | grep -vE "^Merge |^\[tx-log\]|^chore: tx-log")
        echo "Real commits for bump detection:"
        echo "$REAL_COMMITS"
        BUMP=patch
        echo "$REAL_COMMITS" | grep -qiE "BREAKING CHANGE" && BUMP=major
        echo "$REAL_COMMITS" | grep -qE "^feat(\([^)]*\))?:" && [ "$BUMP" != "major" ] && BUMP=minor
        echo "Bump type: $BUMP"
        # 4. Compute new tag (single awk — no intermediate shell vars)
        NEW_TAG=$(echo "$LAST_TAG" | awk -F. -v bump="$BUMP" '{
          gsub(/^v/,"",$1)
          if(bump=="major") printf "v%d.0.0\n",$1+1
          else if(bump=="minor") printf "v%s.%d.0\n",$1,$2+1
          else printf "v%s.%s.%d\n",$1,$2,$3+1
        }')
        echo "Last: $LAST_TAG → Bump: $BUMP → New: $NEW_TAG"
        # 5. Create tag via API
        curl -sf -X POST \
          -H "Authorization: token $GITEA_TOKEN" \
          -H "Content-Type: application/json" \
          "$API/tags" \
          -d "$(jq -n --arg tag "$NEW_TAG" --arg sha "$CI_COMMIT_SHA" \
            '{tag_name: $tag, target: $sha}')"
        echo "Tag $NEW_TAG created — draft-release-notes will trigger on tag event"
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token

  - name: draft-release-notes
    image: node:20-alpine
    when:
      event: tag
    commands:
      - |
        apk add --no-cache git curl jq
        git fetch --tags "https://oauth2:${GITEA_TOKEN}@gitea.grosswig-it.de/GRO/Claude-Usage-Dashboard.git" 2>/dev/null || true
        NOTES=$(node scripts/generate-release-notes.js "${CI_COMMIT_TAG}" --public 2>/dev/null || echo "")
        INTERNAL=$(node scripts/generate-release-notes.js "${CI_COMMIT_TAG}" 2>/dev/null || echo "")
        if [ -z "$NOTES" ] && [ -z "$INTERNAL" ]; then
          echo "No release notes generated — creating minimal draft"
          NOTES="Release ${CI_COMMIT_TAG}"
        fi
        BODY=$(printf '%s\n\n<!--INTERNAL-->\n\n%s' "$NOTES" "$INTERNAL")
        curl -sf -X POST \
          -H "Authorization: token $GITEA_TOKEN" \
          -H "Content-Type: application/json" \
          "https://gitea.grosswig-it.de/api/v1/repos/GRO/Claude-Usage-Dashboard/releases" \
          -d "$(jq -n --arg tag "$CI_COMMIT_TAG" --arg body "$BODY" \
            --arg name "$CI_COMMIT_TAG" \
            '{tag_name: $tag, name: $name, body: $body, draft: true}')" \
        || echo "WARNING: Draft release creation failed (may already exist)"
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
