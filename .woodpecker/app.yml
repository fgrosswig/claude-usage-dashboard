# Vollständig nach GRO/SCHUFA .woodpecker/app.yml (feat/fastify-v5), nur App-/Harbor-/K8s-Namen für Claude.
# https://gitea.grosswig-it.de/GRO/SCHUFA/src/branch/feat/fastify-v5/.woodpecker/app.yml
#
# Secrets: harbor_user, harbor_password, kube_url, kube_token
# Deploy: kubectl apply -k k8s/overlays/dev (Manifeste wie SCHUFA unter k8s/base + overlays/dev)

when:
  event: [push, manual]
  branch:
    include:
      - feat/**
      - fix/**
      - main
      - int

labels:
  platform: linux/amd64

steps:
  # SCHUFA: sed Dockerfile.ci aus version.json — hier nur ein Dockerfile, Schritt bleibt als klarer No-Op.
  - name: prepare
    image: alpine:3.21
    commands:
      - |
        test -f Dockerfile
        echo "claude-usage-dashboard single-stage Dockerfile (kein Dockerfile.ci)"

  - name: build-push
    image: plugins/kaniko
    settings:
      repo: harbor.grosswig-it.de/claude/claude-usage-dashboard
      registry: harbor.grosswig-it.de
      dockerfile: Dockerfile
      tags:
        - latest
        - "${CI_COMMIT_SHA:0:8}"
      build_args:
        - CI_COMMIT_SHORT_SHA=${CI_COMMIT_SHA:0:8}
        - CI_COMMIT_REF_NAME=${CI_COMMIT_BRANCH}
      username:
        from_secret: harbor_user
      password:
        from_secret: harbor_password

  - name: deploy
    image: bitnami/kubectl:1.31
    commands:
      - kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify apply -k k8s/overlays/dev
      - kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify set image deployment/claude-app app=harbor.grosswig-it.de/claude/claude-usage-dashboard:${CI_COMMIT_SHA:0:8} -n claude
      - kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify rollout status deployment/claude-app -n claude --timeout=120s
    environment:
      KUBE_URL:
        from_secret: kube_url
      KUBE_TOKEN:
        from_secret: kube_token

  - name: cleanup
    image: alpine:3.21
    environment:
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASS:
        from_secret: harbor_password
    commands:
      - |
        apk add --no-cache curl jq
        KEEP=2
        API="https://harbor.grosswig-it.de/api/v2.0/projects/claude/repositories/claude-usage-dashboard/artifacts"
        TAGS=$(curl -s -u "$HARBOR_USER:$HARBOR_PASS" "$API?page_size=50&sort=-push_time" | jq -r '.[].tags[]?.name // empty' 2>/dev/null | grep -v latest)
        COUNT=0
        echo "$TAGS" | while read TAG; do
          COUNT=$((COUNT+1))
          if [ $COUNT -gt $KEEP ]; then
            curl -s -X DELETE -u "$HARBOR_USER:$HARBOR_PASS" "$API/$TAG" || true
          fi
        done
    failure: ignore
