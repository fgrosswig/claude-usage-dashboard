# Wie GRO/SCHUFA — .woodpecker/app.yml (Branch feat/fastify-v5):
# Kaniko, Deploy mit KUBE_URL/KUBE_TOKEN (kein kubeconfig), Harbor-Cleanup.
# https://gitea.grosswig-it.de/GRO/SCHUFA/src/branch/feat/fastify-v5/.woodpecker/app.yml
#
# Secrets: harbor_user, harbor_password, kube_url, kube_token
# Doku: SCHUFA docs/01-deployment.md · Harbor: infrastructure-docs 05-harbor.md

when:
  - event: push
    branch:
      include:
        - main
        - feat/**
        - fix/**
  - event: tag
  - event: deployment
  - event: manual

labels:
  platform: linux/amd64

steps:
  - name: node-check-dashboard-client
    image: docker.io/node:22-alpine
    commands:
      - node --check public/js/dashboard.client.js

  - name: helm-lint-template
    image: docker.io/alpine/helm:3.16.3
    commands:
      - helm lint k8/claude-usage-dashboard
      - helm template woodpecker-smoke k8/claude-usage-dashboard >/dev/null

  # Auth: Woodpecker-Secrets = Harbor-Robot (JSON name + secret), Repository Pull+Push.
  - name: build-push
    image: plugins/kaniko
    settings:
      repo: harbor.grosswig-it.de/claude/claude-usage-dashboard
      registry: harbor.grosswig-it.de
      dockerfile: Dockerfile
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      username:
        from_secret: harbor_user
      password:
        from_secret: harbor_password

  # Wie SCHUFA: bitnami/kubectl + --server/--token/--insecure-skip-tls-verify (kein kubeconfig).
  # Kein k8s/overlays/dev im Repo → Manifeste per helm template | kubectl apply; set image + rollout wie SCHUFA.
  - name: deploy
    image: docker.io/bitnami/kubectl:1.31
    environment:
      KUBE_URL:
        from_secret: kube_url
      KUBE_TOKEN:
        from_secret: kube_token
    commands:
      - kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify create namespace claude --dry-run=client -o yaml | kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify apply -f -
      - |
        set -e
        TAG=$(printf '%s' "$CI_COMMIT_SHA" | cut -c1-8)
        if [ -n "${CI_COMMIT_TAG:-}" ]; then TAG="$CI_COMMIT_TAG"; fi
        curl -fsSL "https://get.helm.sh/helm-v3.16.3-linux-amd64.tar.gz" | tar xz -C /tmp
        export PATH="/tmp/linux-amd64:$PATH"
        helm template cud ./k8/claude-usage-dashboard -n claude \
          --set image.repository=harbor.grosswig-it.de/claude/claude-usage-dashboard \
          --set image.tag="$TAG" \
          --set image.pullPolicy=Always \
          --set "imagePullSecrets[0].name=harbor-pull" \
          | kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify apply -f -
      - |
        TAG=$(printf '%s' "$CI_COMMIT_SHA" | cut -c1-8)
        if [ -n "${CI_COMMIT_TAG:-}" ]; then TAG="$CI_COMMIT_TAG"; fi
        kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify set image deployment/cud-claude-usage-dashboard app=harbor.grosswig-it.de/claude/claude-usage-dashboard:${TAG} -n claude
      - kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify rollout status deployment/cud-claude-usage-dashboard -n claude --timeout=120s

  - name: cleanup
    image: docker.io/alpine:3.21
    environment:
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASS:
        from_secret: harbor_password
    commands:
      - |
        apk add --no-cache curl jq
        KEEP=2
        API="https://harbor.grosswig-it.de/api/v2.0/projects/claude/repositories/claude-usage-dashboard/artifacts"
        TAGS=$(curl -s -u "$HARBOR_USER:$HARBOR_PASS" "$API?page_size=50&sort=-push_time" | jq -r '.[].tags[]?.name // empty' 2>/dev/null | grep -v latest)
        COUNT=0
        echo "$TAGS" | while read TAG; do
          COUNT=$((COUNT+1))
          if [ $COUNT -gt $KEEP ]; then
            curl -s -X DELETE -u "$HARBOR_USER:$HARBOR_PASS" "$API/$TAG" || true
          fi
        done
    failure: ignore
