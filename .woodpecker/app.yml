# Wie GRO/SCHUFA .woodpecker/app.yml: nur platform → Docker-Agent .220 (Kaniko + kurze Image-Namen).
# backend: kubernetes würde Job-Pods auf .171 erzeugen (Hub/poc-Pull anders als auf .220).
when:
  - event: push
    branch: main
  - event: manual


labels:
  platform: linux/amd64

steps:
  - name: prepare
    image: alpine
    commands:
      - |
        BASE_VER=$(awk -F'"' '/base_image/{print $4}' version.json)
        echo "Base image tag: $BASE_VER"
        sed "s|^ARG BASE_TAG=.*|ARG BASE_TAG=$BASE_VER|" Dockerfile > Dockerfile.ci

  - name: build-push
    image: plugins/kaniko
    settings:
      repo: harbor.grosswig-it.de/claude/claude-usage-dashboard
      registry: harbor.grosswig-it.de
      dockerfile: Dockerfile.ci
      tags:
        - latest
        - '${CI_COMMIT_SHA:0:8}'
      build_args:
        - CI_COMMIT_SHORT_SHA=${CI_COMMIT_SHA:0:8}
        - CI_COMMIT_REF_NAME=${CI_COMMIT_BRANCH}
      username:
        from_secret: harbor_user
      password:
        from_secret: harbor_password

  - name: deploy
    # Kein :1.31 — auf Docker Hub fehlt der Kurz-Tag oft (manifest unknown); wie SCHUFA ohne Tag = rolling latest
    image: bitnami/kubectl
    commands:
      - |
        set -eux
        # Ohne --request-timeout kann kubectl bei API/Netz hängen (rollout --timeout begrenzt nur den Watch).
        K="kubectl --server=$KUBE_URL --token=$KUBE_TOKEN --insecure-skip-tls-verify --request-timeout=120s"
        $K apply -k k8s/overlays/dev
        if ! $K get secret harbor-pull -n claude >/dev/null 2>&1; then
          echo "ERROR: Secret harbor-pull fehlt in Namespace claude — ohne ihn kann der Node kein privates Harbor-Image ziehen."
          echo "Siehe k8s/README.md (Pull-Secret aus Harbor-Robot). Beispiel: kubectl create secret docker-registry harbor-pull -n claude --docker-server=harbor.grosswig-it.de ..."
          exit 1
        fi
        $K set image deployment/claude-app app=harbor.grosswig-it.de/claude/claude-usage-dashboard:${CI_COMMIT_SHA:0:8} -n claude
        $K rollout status deployment/claude-app -n claude --timeout=3m
    environment:
      KUBE_URL:
        from_secret: kube_url
      KUBE_TOKEN:
        from_secret: kube_token

  - name: cleanup
    image: alpine
    environment:
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASS:
        from_secret: harbor_password
    commands:
      - |
        apk add --no-cache curl jq
        KEEP=2
        API="https://harbor.grosswig-it.de/api/v2.0/projects/claude/repositories/claude-usage-dashboard/artifacts"
        TAGS=$(curl -s -u "$HARBOR_USER:$HARBOR_PASS" "$API?page_size=50&sort=-push_time" | jq -r '.[].tags[]?.name // empty' 2>/dev/null | grep -v latest)
        COUNT=0
        echo "$TAGS" | while read TAG; do
          COUNT=$((COUNT+1))
          if [ $COUNT -gt $KEEP ]; then
            curl -s -X DELETE -u "$HARBOR_USER:$HARBOR_PASS" "$API/$TAG" || true
          fi
        done
    failure: ignore
