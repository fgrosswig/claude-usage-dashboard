# Woodpecker CI — https://ci.grosswig-it.de/repos/3
# Syntax: https://woodpecker-ci.org/docs/usage/workflow-syntax
#
# Auslöser (wie „on: push“ bei Gitea Actions / SCHUFA):
#   • Jeder Push (inkl. neuer Commit auf main) startet diese Pipeline.
#   • docker-build läuft bei Push/PR/Tag/… und baut das Image aus dem Dockerfile im Repo-Root.
#   • harbor-push läuft bei Push auf Branch main (und Tag / Deployment / manuell): Image → Harbor.
#   • PRs: bauen + helm-Check, kein Harbor-Push (keine Registry-Verschmutzung).
#
# Referenz Gitea Actions (SCHUFA, statisch — kein K8s): k8/README.md
#
# Repository-Secrets (Woodpecker UI): harbor_user, harbor_password, kube_url, kube_token
# Agent: Docker-Socket für Build + Push (siehe k8/README.md).

when:
  - event: [push, pull_request, tag, deployment, manual]

steps:
  - name: node-check-dashboard-client
    image: docker.io/node:22-alpine
    commands:
      - node --check public/js/dashboard.client.js

  # Image aus dem aktuellen Commit — bei jedem passenden Repo-Push (siehe „when“ oben).
  - name: docker-build
    image: docker.io/docker:26-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build --progress=plain -t claude-usage-dashboard:ci .

  - name: helm-lint-template
    image: docker.io/alpine/helm:3.16.3
    commands:
      - helm lint k8/claude-usage-dashboard
      - helm template woodpecker-smoke k8/claude-usage-dashboard >/dev/null

  # Nach Commit-Push auf main: dasselbe Image wie docker-build → Harbor (:sha8, :latest, …).
  # Zusätzlich bei Tag / Deployment / manuell (vor helm-deploy). Kein Push bei PRs.
  - name: harbor-push
    when:
      - event: push
        branch: main
      - event: tag
      - event: deployment
      - event: manual
    image: docker.io/docker:26-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        value: harbor.grosswig-it.de
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
      - export IMG="$HARBOR_REGISTRY/claude/claude-usage-dashboard"
      - export TAG=$(printf '%s' "$CI_COMMIT_SHA" | cut -c1-8)
      - docker tag claude-usage-dashboard:ci "${IMG}:${TAG}"
      - docker push "${IMG}:${TAG}"
      - docker tag claude-usage-dashboard:ci "${IMG}:latest"
      - docker push "${IMG}:latest"
      - |
        if [ -n "${CI_COMMIT_TAG:-}" ]; then
          docker tag claude-usage-dashboard:ci "${IMG}:${CI_COMMIT_TAG}"
          docker push "${IMG}:${CI_COMMIT_TAG}"
        fi

  # Aus Woodpecker „Deploy“ / manuell — setzt kubeconfig aus Token-URL
  - name: helm-deploy
    when:
      - event: deployment
      - event: manual
    image: docker.io/dtzar/helm-kubectl:3.14.4
    environment:
      KUBE_URL:
        from_secret: kube_url
      KUBE_TOKEN:
        from_secret: kube_token
    commands:
      - kubectl config set-cluster ci --server="$KUBE_URL" --insecure-skip-tls-verify=true
      - kubectl config set-credentials ci --token="$KUBE_TOKEN"
      - kubectl config set-context ci --cluster=ci --user=ci
      - kubectl config use-context ci
      - |
        TAG=$(printf '%s' "$CI_COMMIT_SHA" | cut -c1-8)
        if [ -n "${CI_COMMIT_TAG:-}" ]; then TAG="$CI_COMMIT_TAG"; fi
        helm upgrade --install cud ./k8/claude-usage-dashboard -n claude --create-namespace \
          --set image.repository=harbor.grosswig-it.de/claude/claude-usage-dashboard \
          --set image.tag="$TAG" \
          --set image.pullPolicy=Always \
          --set "imagePullSecrets[0].name=harbor-pull"
