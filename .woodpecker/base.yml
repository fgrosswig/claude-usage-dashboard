# DEPRECATED — migrated to .gitea/workflows/base-image.yml (Gitea Actions)
# Kept as manual-only fallback.
when:
  event: [manual]

labels:
  platform: linux/amd64
  backend: docker

steps:
  - name: build-base
    image: plugins/docker
    settings:
      repo: harbor.grosswig-it.de/claude/base
      registry: harbor.grosswig-it.de
      dockerfile: Dockerfile.base
      tags:
        - v3
        - latest
      username:
        from_secret: harbor_user
      password:
        from_secret: harbor_password
