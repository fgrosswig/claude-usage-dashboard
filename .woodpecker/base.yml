# Base-Image auf Docker-Agent .220 → Harbor claude/base. Muss existieren, bevor app.yml (Kaniko auf .171) baut.
# Erstbefüllung Harbor: Workflow hier manuell in Woodpecker starten (path-Filter gilt bei manual nicht).
# plugins/docker-Image nur über Harbor **poc** (kein Docker Hub).
when:
  event: [push, manual]
  path:
    - Dockerfile.base
    - version.json
    # Abhängigkeiten liegen im Base-Image (npm install in Dockerfile.base), nicht im App-Layer
    - package.json
    - package-lock.json
  branch:
    include:
      - feat/**
      - fix/**
      - main
      - int

labels:
  platform: linux/amd64
  backend: docker

steps:
  - name: build-base
    image: plugins/docker
    settings:
      repo: harbor.grosswig-it.de/claude/base
      registry: harbor.grosswig-it.de
      dockerfile: Dockerfile.base
      tags:
        - v3
        - latest
      username:
        from_secret: harbor_user
      password:
        from_secret: harbor_password
