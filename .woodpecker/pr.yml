# Nur PRs — ohne Harbor/Kaniko. Docker-Agent .220; Images nur über Harbor **poc** (kein Docker Hub).

when:
  - event: pull_request

labels:
  platform: linux/amd64
  backend: docker

steps:
  - name: node-check-dashboard-client
    image: harbor.grosswig-it.de/poc/library/node:20-alpine
    commands:
      - node --check public/js/dashboard.client.js

  - name: helm-lint-template
    image: harbor.grosswig-it.de/poc/alpine/helm:3.16.3
    commands:
      - helm lint k8/claude-usage-dashboard
      - helm template woodpecker-smoke k8/claude-usage-dashboard >/dev/null
