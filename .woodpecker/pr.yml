# DEPRECATED — migrated to .gitea/workflows/pr-check.yml (Gitea Actions)
# Kept as manual-only fallback.
when:
  event: manual

# Sonar braucht vollen Clone für SCM-Blame und new-code-period detection.
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      depth: 0
      partial: false

labels:
  platform: linux/amd64
  backend: docker

steps:
  - name: verify
    image: alpine:3.20
    commands:
      - apk add --no-cache kubectl
      - sh scripts/k8-ci-verify.sh

  - name: sonar-scan-pr
    image: sonarsource/sonar-scanner-cli
    commands:
      - |
        sonar-scanner \
          -Dsonar.host.url=$SONAR_URL \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.pullrequest.key=$CI_COMMIT_PULL_REQUEST \
          -Dsonar.pullrequest.branch=$CI_COMMIT_SOURCE_BRANCH \
          -Dsonar.pullrequest.base=$CI_COMMIT_TARGET_BRANCH
    environment:
      SONAR_URL:
        from_secret: sonar_url
      SONAR_TOKEN:
        from_secret: sonar_token
