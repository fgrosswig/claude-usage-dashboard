# Traefik-Ingress. DNS (AdGuard-Rewrite o. ä.) → IP, auf der Traefik 80/443 ausliefert (06-traefik.md).
# Standard: nur HTTP (web). TLS: unten spec.tls einfügen + Secret claude-usage-tls ODER TLS am Traefik-Edge.
# Ohne Ingress: nur ClusterIP — z. B. kubectl -n claude port-forward svc/claude-app 3333:3333
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claude-app
  labels:
    app: claude-dashboard
  annotations:
    # Explizit HTTP-Entrypoint (Traefik-Chart: meist "web"; sonst in Traefik-Konfig prüfen)
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # HTTPS mit cert-manager im Cluster:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # Dann spec.tls (siehe README) + traefik router entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: claude-usage.grosswig-it.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claude-app
                port:
                  name: http-dashboard
    - host: claude-usage-proxy.grosswig-it.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claude-app
                port:
                  name: http-proxy
