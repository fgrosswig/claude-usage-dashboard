# Ingress wird vom Cluster-Controller verarbeitet (hier: nginx apps ingress, siehe `kubectl get ingressclass`).
# ERR_CONNECTION_REFUSED: Auf dem K8s-Node lauscht Ingress meist nicht auf :80, sondern als NodePort (z. B. :32080).
# DNS daher entweder auf Traefik (.220) mit Dynamic-Config → NodePort .171:32080 (06-traefik.md / k8s-services.yml),
# oder Test: curl -v --resolve claude-usage.grosswig-it.de:32080:192.168.1.171 http://claude-usage.grosswig-it.de:32080/
# Ohne Ingress: ClusterIP — z. B. kubectl -n claude port-forward svc/claude-app 3333:3333
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claude-app
  labels:
    app: claude-dashboard
  annotations:
    # HTTPS im Cluster (optional): cert-manager.io/cluster-issuer: letsencrypt-prod + spec.tls unten
spec:
  ingressClassName: nginx
  rules:
    - host: claude-usage.grosswig-it.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claude-app
                port:
                  name: http-dashboard
    - host: claude-usage-proxy.grosswig-it.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claude-app
                port:
                  name: http-proxy
